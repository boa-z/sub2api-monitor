# 示例配置 — 复制为 config.yaml 后填写真实值
# cp config.example.yaml config.yaml

instance: "prod" # 告警消息里的实例名（多实例部署时区分）

sub2api:
  base_url: "http://127.0.0.1:8080" # 不要尾斜杠
  admin_api_key: "" # 后台 Settings → Admin API Key
  # jwt: ""                       # 可选：Bearer JWT，与 admin_api_key 二选一
  timeout: 15s
  insecure_skip_verify: false # 仅自签证书调试时开启

telegram:
  bot_token: ""
  chat_id: "" # 默认接收人（用户/群/频道 ID，群多为负数）
  # extra_chat_ids:               # 额外默认接收人（所有默认告警都会抄送）
  #   - "123456789"
  parse_mode: "HTML" # HTML | MarkdownV2 | 空
  disable_notification: false # true 时静音推送
  send_startup_message: true # 启动时是否向默认 chat 发一条通知
  min_send_interval: 50ms # 全局限速，避免 Telegram 429
  # api_base: "https://api.telegram.org"  # 可选代理镜像

  # ---------- Telegram 用户态面板 ----------
  # 用户私聊 Bot 可自助配置：连接 / 账号（列表选择）/ 阈值 / 立即检查
  # 每位用户数据隔离，存于 users_path（默认 ./data/users.json）
  # 启动时会 setMyCommands 注册命令菜单；密钥输入会尽量 deleteMessage
  panel:
    enabled: false # true 开启交互面板 + 按用户轮询用量
    # admin_user_ids:          # 管理员（运维视图 + 账号管理写操作 + 批量/搜索/导入全局连接）
    #   - 123456789                 # 替换为管理员 Telegram 数字 ID
    # allow_user_ids:          # 普通用户白名单；非空时仅列表内（及管理员）可用
    #   - 987654321

    allow_all: false # true = 任意用户可用（仍互相隔离）
    open_registration: true # allow 列表为空时是否开放注册（默认 true）
    # 角色说明：
    # - 管理员：admin_user_ids，或 admin 列表为空时回退 telegram.chat_id 所有者；
    #   也可在 data/users.json 将 profile.role 设为 admin / user 覆盖。
    # - 普通用户：自助连接 / 监控账号 / 阈值 / 立即检查；无 manage 写操作。
    users_path: "./data/users.json" # 用户配置持久化路径
    check_interval: 5m # 用户监控账号的检查间隔
    cooldown: 2h # 用户用量告警冷却

# ---------- 可插拔通知通道（推荐） ----------
# 与顶层 telegram: 并存；未写 notify: 时仍兼容仅配置 telegram.bot_token 的旧写法。
# 新增通道：实现 notify.Channel，并在 internal/notify/factory 注册。
notify:
  # telegram:
  #   enabled: true                 # 可覆盖/复用顶层 telegram 凭证
  #   bot_token: ""
  #   chat_id: ""
  #   extra_chat_ids: []
  feishu:
    enabled: false
    # 群自定义机器人 Webhook（运维告警推荐）
    webhook_url: ""
    # 若机器人开启了签名校验，填写签名密钥
    webhook_secret: ""
    # 以下为后续「应用身份发 IM」预留（当前仅 webhook 可用）
    # app_id: ""
    # app_secret: ""
    # default_receive_ids: []

poll:
  interval: 30s # 主循环间隔（各探针也可单独设 interval）
  jitter: 3s # 防惊群抖动

alert:
  cooldown: 10m # 同一 fingerprint 冷却
  send_resolved: true # 恢复时发 RESOLVED
  max_message_runes: 3500 # Telegram 上限 4096，留余量
  # quiet_hours:                 # 可选静默时段（本地时区）
  #   start: "23:00"
  #   end: "08:00"
  #   allow_severities: ["P0"]

state:
  driver: "memory" # memory | sqlite（sqlite 实际落盘为 JSON 文件）
  sqlite_path: "./data/state.db"

checks:
  health:
    enabled: true
    interval: 30s
    fail_threshold: 2 # 连续失败 N 次才告警

  dashboard:
    enabled: true
    interval: 60s
    max_error_accounts: 0 # > 该值告警；0 表示任何 error 账号都告警
    max_overload_accounts: 5
    max_ratelimit_accounts: 20

  accounts:
    enabled: true
    interval: 60s
    # 关注的状态变化
    watch_statuses: ["error"]
    watch_rate_limited: true
    watch_overload: true
    watch_temp_unschedulable: true
    page_size: 100

  availability:
    enabled: true
    interval: 60s
    min_available_ratio: 0.3 # 分组/平台可用比例低于此值
    min_available_accounts: 1 # 绝对可用数低于此值

  ops_alerts:
    enabled: true
    interval: 30s
    # 仅转发这些严重级别；空=全部
    severities: ["P0", "P1", "P2"]
    statuses: ["firing", "open", "active"] # 按 API 实际字段过滤

  errors:
    enabled: false
    interval: 60s
    window: 5m
    max_request_errors: 50
    max_upstream_errors: 50

  traffic:
    enabled: false
    interval: 60s
    window: 5min # 对应 API: 1min|5min|30min|1h
    min_qps: 0.1 # 低于此 QPS 视为异常（需业务常有流量）

  # ---------- 指定账号用量监控 ----------
  # 轮询：
  #   GET /api/v1/admin/accounts/:id/usage?source=passive|active
  #   GET /api/v1/admin/accounts/:id/today-stats
  # utilization 为 0-100 的百分比；达到阈值后向 chat_ids（或默认 chat）推送
  # 低于恢复线（默认 threshold-5，可 resolve_below 覆盖）时发 RESOLVED
  account_usage:
    enabled: false
    interval: 5m
    source: "passive" # passive 不打上游；active 会触发上游查询（更准但更重）
    force_active: false # source=active 时是否 force=true 刷新上游
    concurrency: 3 # 并发查询账号数
    cooldown: 2h # 同一账号+窗口阈值的去重冷却（覆盖全局 alert.cooldown）
    # 默认阈值（每个账号可覆盖）
    default_thresholds:
      - window: five_hour # 别名: 5h ；Claude/Codex 5 小时窗口
        utilization_gte: 80 # 使用率 >= 该百分比时告警
        # resolve_below: 75   # 可选迟滞；默认 threshold-5
        severity: P2 # P0 | P1 | P2 | P3
      - window: seven_day # 别名: 7d
        utilization_gte: 90
        severity: P1
      # - window: max           # 取所有可用窗口的最高使用率
      #   utilization_gte: 95
      #   severity: P0
      # - window: seven_day_sonnet
      #   utilization_gte: 85
      # - window: seven_day_fable
      #   utilization_gte: 85
      # - window: gemini_shared_daily
      #   utilization_gte: 80
      # - window: gemini_pro_daily
      #   utilization_gte: 80
      # - window: gemini_flash_daily
      #   utilization_gte: 80
      # - window: "antigravity:claude-sonnet-4-5"
      #   utilization_gte: 80
    # default_today:              # 可选：今日本地统计阈值（cost/tokens/requests）
    #   cost_gte: 50              # 今日费用 >=
    #   tokens_gte: 5000000       # 今日 token >=
    #   requests_gte: 10000       # 今日请求数 >=
    #   severity: P2
    accounts:
      # - id: 42                  # 必填：Sub2API 账号 ID
      #   name: "claude-main"     # 仅展示用；不填则用后台账号名
      #   chat_ids:               # 不填则用 telegram.chat_id (+ extra_chat_ids)
      #     - "123456789"             # 替换为接收提醒的 chat_id

      #   # source: active        # 覆盖全局 source
      #   # disable_usage: false  # 只关用量窗口、保留 today
      #   # disable_today: false  # 只关 today 统计
      #   thresholds:             # 覆盖 default_thresholds
      #     - window: five_hour
      #       utilization_gte: 70
      #       severity: P1
      #     - window: seven_day
      #       utilization_gte: 85
      #       severity: P1
      #   today:                  # 覆盖 default_today
      #     cost_gte: 20
      #     tokens_gte: 2000000
      #     severity: P2

logging:
  level: "info" # debug|info|warn|error
  format: "text" # text|json
