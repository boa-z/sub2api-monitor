name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)" || {
            echo "gofmt needed:"
            gofmt -l ./cmd ./internal
            exit 1
          }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build (smoke)
        run: |
          make build
          ./bin/sub2api-monitor -version
